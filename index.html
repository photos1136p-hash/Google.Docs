<!DOCTYPE html>
<html>
<head>
    <title>Google Docs</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico">
    
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css"> <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>
    <script src="index.js" defer></script> 
</head>
<body>
    <div class="container">
        <h1>Recent Documents</h1>
        <p>Search or enter a URL to open a document</p>
        
        <form id="uv-form">
            <input id="uv-address" type="text" placeholder="Search Google Docs or type a URL" class="uv-input">
        </form>
        
        <div class="desc">
            <p id="uv-error"></p>
            <code id="uv-error-code"></code>
        </div>
    </div>
</body>
</html>
